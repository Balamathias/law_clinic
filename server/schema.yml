components:
  schemas:
    AppData:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        name:
          type: string
          maxLength: 255
        logo_url:
          type: string
          format: uri
          nullable: true
          maxLength: 200
        mission_statement:
          type: string
        vision_statement:
          type: string
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
        objectives:
          type: string
          nullable: true
          description: Comma-separated objectives
        history:
          type: string
          nullable: true
      required:
      - created_at
      - id
      - mission_statement
      - name
      - updated_at
      - vision_statement
    Category:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        name:
          type: string
          maxLength: 100
        slug:
          type: string
          maxLength: 120
          pattern: ^[-a-zA-Z0-9_]+$
        description:
          type: string
          nullable: true
      required:
      - id
      - name
    ContentFormatEnum:
      enum:
      - markdown
      - html
      type: string
      description: |-
        * `markdown` - Markdown
        * `html` - HTML
    DepartmentEnum:
      enum:
      - clinical
      - research
      - litigation
      - other
      type: string
      description: |-
        * `clinical` - Clinical Department
        * `research` - Research Department
        * `litigation` - Litigation Department
        * `other` - Other
    Event:
      type: object
      description: Serializer for events
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        title:
          type: string
          maxLength: 255
        slug:
          type: string
          maxLength: 255
          pattern: ^[-a-zA-Z0-9_]+$
        description:
          type: string
        short_description:
          type: string
          nullable: true
          description: A brief summary of the event (for listings)
        start_date:
          type: string
          format: date-time
        end_date:
          type: string
          format: date-time
        location:
          type: string
          description: Physical location of the event
          maxLength: 255
        virtual_link:
          type: string
          format: uri
          nullable: true
          description: Link for virtual attendance
          maxLength: 200
        category:
          type: string
          format: uuid
          nullable: true
        category_name:
          type: string
          readOnly: true
        image:
          type: string
          format: uri
          nullable: true
          description: Cover image URL for the event
          maxLength: 200
        organizer:
          type: string
          format: uuid
          nullable: true
        organizer_name:
          type: string
          readOnly: true
        max_participants:
          type: integer
          maximum: 2147483647
          minimum: 0
          description: 0 for unlimited participants
        registration_required:
          type: boolean
        registration_deadline:
          type: string
          format: date-time
          nullable: true
        status:
          $ref: '#/components/schemas/Status49cEnum'
        featured:
          type: boolean
          description: Feature this event on the homepage
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
        registration_count:
          type: string
          readOnly: true
        is_upcoming:
          type: string
          readOnly: true
        is_ongoing:
          type: string
          readOnly: true
        has_registration_closed:
          type: string
          readOnly: true
      required:
      - category_name
      - created_at
      - description
      - end_date
      - has_registration_closed
      - id
      - is_ongoing
      - is_upcoming
      - location
      - organizer_name
      - registration_count
      - start_date
      - title
      - updated_at
